<script type="text/javascript">
RED.nodes.registerType('ble-scan', {
    category: 'hardware',
    color: '#3FADB5',
    defaults: {
        name:       { value: '' },
        controller: { value: '', type: 'ble-controller', required: true },
        autoStart:  { value: false }
    },
    inputs: 1,
    outputs: 1,
    icon: 'bluetooth.png',
    label: function() { return this.name || 'BLE Scan'; },
    inputLabels:  ['start / stop / toggle'],
    outputLabels: ['discovered device']
});
</script>

<script type="text/x-red" data-template-name="ble-scan">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="BLE Scan">
    </div>
    <div class="form-row">
        <label for="node-input-controller"><i class="fa fa-cog"></i> Controller</label>
        <input type="text" id="node-input-controller">
    </div>
    <div class="form-row">
        <label for="node-input-autoStart"><i class="fa fa-play"></i> Auto-start</label>
        <input type="checkbox" id="node-input-autoStart" style="width:auto; margin-top:6px;">
        <span style="margin-left:6px;">Start scanning on deploy</span>
    </div>
</script>

<script type="text/x-red" data-help-name="ble-scan">
    <p>Découvre les appareils BLE à proximité.</p>
    <h3>Entrée</h3>
    <p>Envoyer un message avec <code>msg.payload</code> :</p>
    <ul>
        <li><code>"start"</code> — démarre le scan</li>
        <li><code>"stop"</code> — arrête le scan</li>
        <li><code>"toggle"</code> — bascule l'état</li>
    </ul>
    <h3>Sortie</h3>
    <p><code>msg.payload</code> : <code>{ id, name, rssi }</code> pour chaque appareil découvert.</p>
</script>
